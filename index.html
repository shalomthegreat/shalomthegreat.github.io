    <script>
      // remove legacy Chripy theme cache
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister().then(function(success) {
              if (success) {
                console.log('Legacy Service Worker unregistered successfully.');
                // Clear the cache storage allocated by the old service worker
                if ('caches' in window) {
                  caches.keys().then(function(names) {
                    for (let name of names) caches.delete(name);
                  });
                }
                // Force a single clean reload to fetch the new site files immediately
                window.location.reload();
              }
            });
          }
        });
      }
    </script>
    <script>
      // GitHub Pages SPA: restore path encoded by 404.html redirect.
      (function () {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) history.replaceState(null, '', decodeURIComponent(p[1]) + window.location.hash);
      })();
    </script>
    <script>
      // Apply theme before paint to avoid flash of incorrect theme.
      (function () {
        try {
          const stored = JSON.parse(localStorage.getItem('theme') || '{}');
          const mode = stored.mode || 'system';
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const isDark = mode === 'dark' || (mode === 'system' && prefersDark);
          const accent = stored.accent || (isDark ? 'sunset' : 'violet');
          document.documentElement.classList.toggle('dark', isDark);
          document.documentElement.setAttribute('data-accent', accent);
        } catch (e) {}
      })();
    </script>
